<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Geburtstagsüberraschung 🐴</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* STARTSCREEN */
#start {
  height: 100vh;
  background-image: url("toskana.jpg");
  background-size: cover;
  background-position: center;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-color: rgba(0,0,0,0.4);
}

.overlay {
  background: rgba(0,0,0,0.5);
  padding: 20px;
}

/* BUTTON */
button {
  padding: 12px 20px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 15px;
}

/* SPIEL */
#levelScreen, #gameScreen, #reward {
  display: none;
  padding: 20px;
}

.level {
  margin: 10px;
  padding: 10px;
  border: 2px solid black;
  cursor: pointer;
}

.done {
  background-color: lightgreen;
}

/* EMOJIS */
.emoji {
  font-size: 50px;
  margin: 10px;
  cursor: pointer;
}

/* LOCK BUTTON */
#rewardBtn {
  background-color: grey;
  color: white;
}

#rewardBtn.unlocked {
  background-color: green;
}

img {
  max-width: 80%;
  margin-top: 20px;
}

</style>
</head>

<body>

<!-- 1. START -->
<div id="start">
  <div class="overlay">
    <h1>🎉 Alles Gute zum Geburtstag 🎉</h1>
    <p>Bevor du dein Geschenk bekommst,<br>
    musst du noch ein kleines Spiel spielen 😄</p>
    <button onclick="startGame()">Spiel starten</button>
  </div>
</div>

<!-- 2. LEVEL AUSWAHL -->
<div id="levelScreen">
  <h2>Wähle ein Level 🐴</h2>

  <div id="level1" class="level" onclick="playLevel(1)">Level 1</div>
  <div id="level2" class="level" onclick="playLevel(2)">Level 2</div>
  <div id="level3" class="level" onclick="playLevel(3)">Level 3</div>

  <br>
  <button id="rewardBtn" onclick="showReward()" disabled>
    🔒 Geschenk freischalten
  </button>
</div>

<!-- 3. SPIEL -->
<div id="gameScreen">
  <h2 id="gameTitle"></h2>
  <div id="gameArea"></div>
</div>

<!-- 4. GUTSCHEIN -->
<div id="reward">
  <h2>🎉 Dein Geschenk 🎉</h2>
  <img src="gutschein.jpg" alt="Gutschein">
</div>

<script>
let completed = [false, false, false];
let currentLevel = 0;

function startGame() {
  document.getElementById("start").style.display = "none";
  document.getElementById("levelScreen").style.display = "block";
}

function playLevel(level) {
  currentLevel = level;
  document.getElementById("levelScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";

  let area = document.getElementById("gameArea");
  let title = document.getElementById("gameTitle");

  area.innerHTML = "";

  if (level === 1) {
    title.innerText = "Finde das Pferd";
    addAnimals(["🐶","🐱","🐴","🐸"]);
  }

  if (level === 2) {
  title.innerText = "Merke dir die Reihenfolge!";

  let sequence = ["🐴","🐶","🐴"];
  alert("Merke dir: " + sequence.join(" "));

  setTimeout(() => {
    area.innerHTML = "";

    let options = ["🐴","🐶","🐱"];

    options.forEach(animal => {
      let span = document.createElement("span");
      span.className = "emoji";
      span.innerText = animal;

      span.onclick = function() {
        if (animal === sequence[0]) {
          winLevel();
        } else {
          alert("Falscher Start 😄");
        }
      };

      area.appendChild(span);
    });

  }, 2000);
}

  if (level === 3) {
    title.innerText = "Finde das richtige Pferd";
    addAnimals(["🐴","🐴","🐴","🐶","🐱"]);
  }
}

function addAnimals(list) {
  let area = document.getElementById("gameArea");

  list.forEach(animal => {
    let span = document.createElement("span");
    span.className = "emoji";
    span.innerText = animal;

    span.onclick = function() {
      if (animal === "🐴") {
        winLevel();
      } else {
        alert("Falsch 😄");
      }
    };

    area.appendChild(span);
  });
}

function winLevel() {
  alert("Level geschafft! 🎉");

  completed[currentLevel - 1] = true;

  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("levelScreen").style.display = "block";

  updateLevels();
}

function updateLevels() {
  completed.forEach((done, index) => {
    if (done) {
      document.getElementById("level" + (index+1)).classList.add("done");
    }
  });

  if (completed.every(v => v)) {
    let btn = document.getElementById("rewardBtn");
    btn.disabled = false;
    btn.classList.add("unlocked");
    btn.innerText = "🎁 Geschenk öffnen";
  }
}

function showReward() {
  document.getElementById("levelScreen").style.display = "none";
  document.getElementById("reward").style.display = "block";
}
</script>

</body>
</html>
